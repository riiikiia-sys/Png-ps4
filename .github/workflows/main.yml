name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # تحديث لـ v4
    
    - name: Set up Java
      uses: actions/setup-java@v4 # تحديث لـ v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4 # هذا هو السطر الأهم، غيرناه لـ v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
